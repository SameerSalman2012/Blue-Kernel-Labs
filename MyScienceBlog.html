    content: `
      <h3>Wait, Infinity Isn't Just One Thing? 🤯</h3>
      <p>Okay, so infinity. Most people think it's just a really, really big number that never ends.</p>

      <p>But nope. Math is weird. Infinity isn't just one thing — <strong>some infinities are actually bigger than others.</strong></p>

      <h3>The Two Infinities That Break Your Brain 🔢</h3>

      <h3>The Guy Who Figured This Out 🧠</h3>

      <p>He proved it with something called Cantor's Diagonal Argument. Absolute savage move.</p>
      <p>Mathematicians at the time were furious. Some called it nonsense. Turns out he was just… right.</p>

      <h3>So What Does This Mean? 🌀</h3>
      <p>Infinity isn't total chaos. It's like organized chaos.</p>
      <p>Like your messy desk — somehow you still know where your pencil is.</p>
      <p>There are actually infinite levels of infinity. Mathematicians call them <strong>cardinalities</strong>. The rabbit hole goes deep.</p>

      <div class="conclusion">

      <h3>What exactly IS time 🕰️?</h3>
      <p>Time is simply a measureable number, or a <em>Physical Quantity</em> in Fancy words, that tells us how much the Earth has rotated.</p>
      <p>Simple enough, right? but NO! Because time just joins some other group chat when its in outer space!</p>

      <h3>Time in Space, and how it abandons Physics to Earth 🌎</h3>
      <p>Let me give y'all an example to talk on.</p>
      <p>For example, an astronaut lives in The ISS, and lives there for 2 years. if he returns back on Earth, he would be a fraction of a bit younger than if he just lived on Earth! So, technically astronauts in Space age slower than us at Earth, while i aged 10 years in my recent exam..and grew a white hair in my arm, dont ask me how..</p>
      <p>I know what you're thinking right now, "Really??"...ok thats kind of an 'AI' thought if you ask me, but dont you worry cause ill tell you how it works.</p>

      <p>"So gravity slows time, speed slows time, and your GPS is out here doing advanced Einstein calculations just so you don't get lost. Very Interesting i must say😬!"</p>

      <div class="conclusion">
        🔬 Blue Kernel Labs Conclusion: Time is absurd, Space is a complete rage-bait technique for your brain, and Einstein was..a giga chad (i may or may not have searched that up to confirm it was a brain-rot term..).

// ============================================================
//  DON'T TOUCH ANYTHING BELOW THIS LINE
//  (unless you know what you're doing 😄)

window.addEventListener("scroll", function() {
    const toggleBtn = document.getElementById("Toggle");
    if (window.scrollY > 80) {
        toggleBtn.classList.add("scrolled");
        if (document.body.classList.contains("dark")) {
            toggleBtn.innerText = "🌘";
        } else {
            toggleBtn.innerText = "☀️";
        }
    } else {
        toggleBtn.classList.remove("scrolled");
        if (document.body.classList.contains("dark")) {
            toggleBtn.innerText = "🌘 Toggle Light Mode";
        } else {
            toggleBtn.innerText = "☀️ Toggle Dark Mode";
        }
    }
});

function renderPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  posts.forEach(post => {
    const section = document.createElement("section");

    section.innerHTML = `
      <header>${post.heading}</header>
      <h1>${post.title}</h1>
      <p class="post-date">📅 ${post.date}</p>
      <p>${post.preview}</p>
      <div id="full-${post.id}" class="fullContent">${post.content}</div>
      <button onclick="togglePost(${post.id}, this)">Read More..</button>
    `;

    container.appendChild(section);
  });
}

function togglePost(id, button) {
  const full = document.getElementById("full-" + id);
  full.classList.toggle("open");

  if (full.classList.contains("open")) {
    button.innerText = "Show Less ▲";
  } else {
    button.innerText = "Read More..";
  }
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
  const toggleBtn = document.getElementById("Toggle");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    toggleBtn.innerText = "🌘 Toggle Light Mode";
  } else {
    localStorage.setItem("theme", "light");
    toggleBtn.innerText = "☀️ Toggle Dark Mode";
  }
}

function pageSwitch() {
  window.location = "About.html";
}

window.onload = function() {
  let today = new Date();
  document.getElementById("currentDate").innerText = today.toLocaleDateString();

  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "dark") {
    document.body.classList.add("dark");
  }

  renderPosts();
};

</script>
