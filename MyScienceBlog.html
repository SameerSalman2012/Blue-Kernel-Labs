<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blue Kernel Labs Blog</title>

<style>

body{
margin:0;
font-family:'Times New Roman', Times, serif;
text-align:center;
background:linear-gradient(to bottom,#8fcfff,#3f7af0);
color:black;
}

*{
font-family:'Times New Roman', Times, serif;
font-weight:bold;
box-sizing:border-box;
}

nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:2000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
height:60px;
background:linear-gradient(90deg,#8fcfff,#ffffff);
border-bottom:3px solid black;
}

.nav-logo{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:inherit;
}

.nav-logo img{
width:42px;
height:42px;
}

.nav-logo-text{
font-size:1.1em;
color:hsl(206,61%,45%);
}

.nav-links{
display:flex;
align-items:center;
gap:8px;
}

.nav-link{
text-decoration:none;
padding:7px 18px;
border-radius:12px;
font-size:0.95em;
color:black;
}

.nav-link.active{
background:linear-gradient(45deg,#1d33d9,#8fcfff);
color:white;
}

header{
background:linear-gradient(90deg,#8fcfff,#ffffff);
border:3px solid black;
border-radius:15px;
margin:80px 15px 15px 15px;
padding:15px;
font-size:xxx-large;
}

section{
padding:60px 20px;
margin:40px auto;
max-width:900px;
background:linear-gradient(90deg,#8fcfff,#ffffff);
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
border:3px solid black;
}

button{
background:linear-gradient(45deg,#1d33d9,#8fcfff);
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:15px;
cursor:pointer;
margin-top:10px;
}

.fullContent{
max-height:0;
opacity:0;
overflow:hidden;
transition:max-height 1s ease,opacity .8s ease;
text-align:left;
}

.fullContent.open{
max-height:2000px;
opacity:1;
padding:10px 20px;
}

.post-date{
font-size:0.85em;
color:#555;
margin:4px 0 12px 0;
font-style:italic;
}

footer{
margin-top:50px;
padding:20px;
background:linear-gradient(to right,#006eff,#8fcfff);
font-size:14px;
}

</style>
</head>

<body>

<nav>

<a href="index.html" class="nav-logo">
<img src="Boron.png">
<span class="nav-logo-text">Blue Kernel Labs</span>
</a>

<div class="nav-links">
<a href="index.html" class="nav-link active">📝 Blog</a>
<a href="Portfolio.html" class="nav-link">🚀 Portfolio</a>
<a href="About.html" class="nav-link">👤 About</a>
</div>

</nav>

<header>Blue Kernel Labs Blog</header>

<div id="postsContainer"></div>

<footer>
© 2026 Blue Kernel Labs | All Rights Reserved
</footer>

<script>

/* KEEP YOUR ORIGINAL POSTS ARRAY HERE */
const posts = [
/* paste your exact posts here */
];

function renderPosts(){

const container=document.getElementById("postsContainer");
container.innerHTML="";

posts.forEach(post=>{

const section=document.createElement("section");

section.innerHTML=`

<header>${post.heading}</header>

<h1>${post.title}</h1>

<p class="post-date">📅 ${post.date}</p>

<p>${post.preview}</p>

<div id="full-${post.id}" class="fullContent">${post.content}</div>

<button onclick="togglePost(${post.id},this)">Read More</button>

`;

container.appendChild(section);

});

}

function togglePost(id,button){

const full=document.getElementById("full-"+id);

full.classList.toggle("open");

button.innerText=full.classList.contains("open")
? "Show Less"
: "Read More";

}

window.onload=renderPosts;

</script>

</body>
</html>
