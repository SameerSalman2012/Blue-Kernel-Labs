<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===================== SEO: BASIC ===================== -->
  <title>Blue Kernel Labs Blog | Science, Tech & Coding</title>
  <meta name="description" content="Blue Kernel Labs Blog — exploring science, mathematics, technology, and coding adventures one post at a time. Written by curious minds, for curious minds." />
  <meta name="keywords" content="science blog, math facts, coding, technology, Blue Kernel Labs, infinity, space, physics" />
  <meta name="author" content="Blue Kernel Labs Studios" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- ===================== SEO: OPEN GRAPH (Facebook, WhatsApp, Discord previews) ===================== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Blue Kernel Labs Blog | Science, Tech & Coding" />
  <meta property="og:description" content="Exploring science, mathematics, technology, and coding adventures — one post at a time." />
  <meta property="og:url" content="https://yourdomain.com/" />
  <meta property="og:image" content="https://yourdomain.com/Boron.png" />
  <meta property="og:site_name" content="Blue Kernel Labs Blog" />

  <!-- ===================== SEO: TWITTER CARD (X / Twitter previews) ===================== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Blue Kernel Labs Blog | Science, Tech & Coding" />
  <meta name="twitter:description" content="Exploring science, mathematics, technology, and coding adventures — one post at a time." />
  <meta name="twitter:image" content="https://yourdomain.com/Boron.png" />

  <!-- ===================== SEO: SCHEMA MARKUP (helps Google understand your site) ===================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Blue Kernel Labs Blog",
    "description": "Exploring science, mathematics, technology, and coding adventures one post at a time.",
    "url": "https://yourdomain.com/",
    "author": {
      "@type": "Organization",
      "name": "Blue Kernel Labs Studios"
    },
    "inLanguage": "en"
  }
  </script>

<style>

    body {
    margin: 0;
    font-family: 'Times New Roman', Times, sans-serif;
    text-align: center;

    background: linear-gradient(to bottom, #8fcfff, #3f7af0);
    color: black;

    transition: background 1.5s ease, color 1s ease;
}


body.dark {
    background: linear-gradient(to bottom, #000000, #1a1a1a);
    color: white;
}

/* Dark mode header */
body.dark header {
    background: linear-gradient(90deg, #111111, #2a2a2a);
    color: white;
    border: 3px solid white;
}

/* Dark mode sections */
body.dark section {
    background: linear-gradient(90deg, #1a1a1a, #2b2b2b);
    border: 3px solid white;
}

/* Dark mode footer */
body.dark footer {
    background: linear-gradient(to right, #000000, #1a1a1a);
    color: white;
}

/* Dark mode buttons */
body.dark button {
    background: linear-gradient(45deg, #222222, #444444);
    color: white;
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
    transition: background 0.5s ease, box-shadow 0.5s ease, transform 0.3s ease;
}

/* Dark mode button hover */
body.dark button:hover {
    background: linear-gradient(45deg, #444444, #666666);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    transform: translateY(-5px);
}

body.dark .header-title {
    -webkit-text-stroke: 1px white;
    color: #dddddd;
}

body.dark header {
    -webkit-text-stroke: white;
}

header {
    background: linear-gradient(90deg, #8fcfff, #ffffff);
    border: 3px solid black;
    border-radius: 15px;
    margin: 15px;
    color: black;
    padding: 15px;
    font-size: xxx-large;
    -webkit-text-stroke: 1px rgb(0, 0, 0);
    font-weight: bold;
    transition: 0.3s;
    transition: background 1.5s ease, color 1s ease;
}

header:hover {
    box-shadow: 0 0 15px rgba(143, 207, 255, 0.7);
}

main {
    padding: 0px;
}

button {
    background: linear-gradient(45deg, #1d33d9, #8fcfff);
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: float 2s ease-in-out infinite;
}

button:hover {
    background: linear-gradient(45deg, #8fcfff, #1d33d9);
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

footer {
    margin-top: 50px;
    padding: 20px;
    background: linear-gradient(to right, #006eff, #8fcfff);
    font-size: 14px;
    font-weight: bold;
}

.header-title {
    color: hsl(206, 61%, 60%);
    font-size: large;
    padding-top: 20px;
    margin: auto;
    font-weight: bold;
    -webkit-text-stroke: 0px black;
    position: fixed;
    top: 1px;
    left: 60px;
}

#currentDate {
    position: fixed;
    top: 10px;
    right: 15px;
    font-size: 14px;
    color: aliceblue;
    font-weight: bold;
}

section {
    padding: 60px 20px;
    margin: 40px auto;
    max-width: 900px;
    background: linear-gradient(90deg, #8fcfff, #ffffff);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    border: 3px solid black;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

section:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
}

* {
    font-family: 'Times New Roman', Times, serif;
    font-weight: bold;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}

#Toggle {
    position: fixed;
    right: 10px;
    top: 12px;
    z-index: 1000;
}
.fullContent {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.8s ease, opacity 0.8s ease, padding 0.5s ease;
  padding: 0 10px;
}

.fullContent.open {
  max-height: 500px;
  opacity: 1;
  padding: 10px;
}
#logo {
  width: 60px;
  height: 60px;
  cursor: pointer;
}

#logo-link {
  position: fixed;
  top: 3px;
  left: 8px;
  z-index: 1000;
}

</style>
</head>

<body>

<h5 class="header-title">Blue Kernel Labs Studios</h5>
<a href="index.html" id="logo-link">
  <img src="Boron.png" alt="Blue Kernel Labs Logo" id="logo">
</a>

<header>
  Blue Kernel Labs Blog
</header>

<main>
  <h1>Welcome to Blue Kernel Labs!</h1>
  <p>Exploring science, tech, and coding adventures—one post at a time!</p>
  <p id="currentDate"></p>

  <button id="Toggle" onclick="toggleDarkMode()">☀️ Toggle Dark Mode</button>
  <button onclick="pageSwitch()">About Blue Kernel Labs...</button>

  <!-- POSTS AUTO GENERATE HERE -->
  <div id="postsContainer"></div>

</main>

<footer>
  © 2026 Blue Kernel Labs | All Rights Reserved
</footer>

<script>

const posts = [
  {
    id: 1,
    heading: "Post 1",
    title: "What Is Infinity in Mathematics? (And Why There Are Different Sizes of It)",
    preview: "Infinity isn't just huge. Some infinities are actually bigger than others… mind blown. ....",
    content: `Okay, so infinity. Most people think it's just a really, really big number that never ends. Like, bigger than the number of times you've hit snooze this week.  

But nope. Math is weird. Infinity isn't just one thing. Some infinities are bigger than others.  

Counting numbers — 1, 2, 3… — that's one type of infinity. But the numbers between 0 and 1? That's a bigger infinity. Yeah, math is trolling us.  

Georg Cantor figured this out and basically said, "No matter how you try to list these numbers, I'll always find one you forgot." Savage.  

So infinity isn't total chaos. It's like organized chaos. Like your messy desk… but somehow you still know where your pencil is.  

Blue Kernel Labs conclusion: Infinity is weird, wild, and secretly hilarious.`
  }
];

function renderPosts() {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  posts.forEach(post => {
    const section = document.createElement("section");

    section.innerHTML = `
      <header>${post.heading}</header>
      <h1>${post.title}</h1>
      <p>${post.preview}</p>
      <div id="full-${post.id}" class="fullContent">${post.content}</div>
      <button onclick="togglePost(${post.id}, this)">Read More..</button>
    `;

    container.appendChild(section);
  });
}

function togglePost(id, button) {
  const full = document.getElementById("full-" + id);
  full.classList.toggle("open");

  if (full.classList.contains("open")) {
    button.innerText = "Show Less";
  } else {
    button.innerText = "Read More..";
  }
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");

  const toggleBtn = document.getElementById("Toggle");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    toggleBtn.innerText = "🌘 Toggle Light Mode";
  } else {
    localStorage.setItem("theme", "light");
    toggleBtn.innerText = "☀️ Toggle Dark Mode";
  }
}

function pageSwitch() {
  window.location = "About.html";
}

window.onload = function() {
  let today = new Date();
  document.getElementById("currentDate").innerText =
      today.toLocaleDateString();

  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "dark") {
    document.body.classList.add("dark");
  }

  renderPosts();
};

</script>

</body>
</html>
