<!DOCTYPE html>
<html>
<head>
  <title>About</title>
  <style>
    #backBtn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background-color: blue;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    #backBtn:hover {
        background-color: rgb(0, 153, 255);
    }
    .dark {
        background-color: #000000;
        color: white;
    }

    body {
        margin: 0;
        font-family: 'Times New Roman', Times, sans-serif;
        background: linear-gradient(to bottom, #8fcfff, #3f7af0);
        text-align: center;
    }

    header {
        background: linear-gradient(90deg, #8fcfff, #ffffff);
        border: 3px solid black;
        border-radius: 15px; /* fixed */
        margin: 15px;
        color: black;
        padding: 15px;
        font-size: xx-large;
        -webkit-text-stroke: 1px rgb(98, 173, 248);
        font-weight: bold;
        transition: 0.3s;
    }

    header:hover {
        box-shadow: 0 0 15px rgba(143, 207, 255, 0.7);
        
    }

    main {
        padding: 0px;
    }

    button {
  
        background: linear-gradient(45deg, #1d33d9, #8fcfff);
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 15px; /* upgraded */
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.08);
        background: linear-gradient(45deg, #8fcfff, #1d33d9);
        box-shadow: 0 0 10px rgba(143, 207, 255, 0.8);
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    footer {
        margin-top: 50px;
        padding: 20px;
        background: linear-gradient(to right, #006eff, #8fcfff);
        font-size: 14px;
        font-weight: bold;
    }

    .header-title {
        color: #ffffff;
        font-size: large;
        padding-top: 20px;
        margin: auto;
        font-weight: bold;
        -webkit-text-stroke: 2px black;
    }

    #currentDate {
        position: fixed;
        top: 10px; /* fixed weird negative value */
        right: 15px;
        font-size: 14px;
        color: aliceblue;
        font-weight: bold;
    }

    section {
        animation: fadeIn 2.5s ease-out;
        background: linear-gradient(to bottom, #ffffff, #8fcfff);
        margin: auto;
        border: 4px solid #000000;
        border-radius: 15px;
        padding: 25px; /* increased so text doesn’t collide */
        max-width: 900px;
        transition: 0.3s;
    }

    section:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    * {
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
    }
    @keyframes fadeIn {
        from{opacity: 0;}
        to {opacity: 1;}
    }
    @keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
    }

button {
  animation: float 2s ease-in-out infinite;
}
</style>
</head>
<script>
    function pageSwitch(){
        window.location = "MyScienceBlog.html"
    }
</script>
<body>
  <button id="backBtn" onclick="pageSwitch()">Back</button>
  <h1>About Blue Kernel Labs</h1>
  <p>Blue Kernel Labs is a company that creates test projects.</p>
  <section>
    <h1>About Me</h1>
    <p>I am a small developer, aiming on creating something revolutionary at an age where people cant understand material adults can.</p>
  </section>
  <footer>
    © 2026 Blue Kernel Labs | All Rights Reserved
  </footer>

</body>
</html>
